<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문학 타자 연습 - 깊이 있는 학습</title>
    
    <!-- React 및 Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- html2canvas (이미지 저장용) -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Pretendard:wght@400;600;800&display=swap');
        .font-serif { font-family: 'Noto Serif KR', serif; }
        .font-sans { font-family: 'Pretendard', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 아이콘 컴포넌트들 (외부 라이브러리 의존성 제거)
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Play = (props) => <Icon {...props}><polygon points="5 3 19 12 5 21 5 3"></polygon></Icon>;
        const RotateCcw = (props) => <Icon {...props}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></Icon>;
        const CheckCircle = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></Icon>;
        const Keyboard = (props) => <Icon {...props}><rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect><path d="M6 8h.001M10 8h.001M14 8h.001M18 8h.001M8 12h.001M12 12h.001M16 12h.001M7 16h10"></path></Icon>;
        const Trophy = (props) => <Icon {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"></path></Icon>;
        const Clock = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></Icon>;
        const Target = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></Icon>;
        const Download = (props) => <Icon {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></Icon>;
        const Calendar = (props) => <Icon {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></Icon>;

        const TypingPractice = () => {
            const [mode, setMode] = useState('setup');
            
            const defaultText = `무엇을 실었느냐 화물 열차의
검은 문들은 탄탄히 잠겨졌다
바람 속을 달리는 화물 열차의 지붕 우에
우리 제각기 드러누워
한결같이 쳐다보는 하나씩의 별

두만강 저쪽에서 온다는 사람들과
쟈무스에서 온다는 사람들과
험한 땅에서 험한 변 치르고
눈보라 치기 전에 고향으로 돌아간다는
남도 사람들과
북어 쪼가리 초담배 밀가루 떡이랑
나눠서 요기하며 내사 서울이 그리워
고향과는 딴 방향으로 흔들려 간다

푸르른 바다와 거리거리를
설움 많은 이민 열차의 흐린 창으로
그저 서러이 내다보던 골짝 골짝을
갈 때와 마찬가지로
헐벗은 채 돌아오는 이 사람들과

마찬가지로 헐벗은 나요
나라에 기쁜 일 많아
울지를 못하는 함경도 사내

총을 안고 뽈가의 노래를 부르던
슬라브의 늙은 병정은 잠이 들었나
바람 속을 달리는 화물 열차의 지붕 우에
우리 제각기 드러누워
한결같이 쳐다보는 하나씩의 별`;

            const [customText, setCustomText] = useState(defaultText);
            const [lines, setLines] = useState([]);
            
            const [currentLineIndex, setCurrentLineIndex] = useState(0);
            const [userInput, setUserInput] = useState('');
            
            const [startTime, setStartTime] = useState(null);
            const [elapsedSeconds, setElapsedSeconds] = useState(0);
            const [totalStrokes, setTotalStrokes] = useState(0);
            const [correctStrokes, setCorrectStrokes] = useState(0);
            const [currentSpeed, setCurrentSpeed] = useState(0);
            const [maxSpeed, setMaxSpeed] = useState(0);
            const [accuracy, setAccuracy] = useState(100);
            const [completionTime, setCompletionTime] = useState(null);

            const inputRef = useRef(null);

            const startPractice = () => {
                const parsedLines = customText
                    .split('\n')
                    .map(line => line.trim())
                    .filter(line => line.length > 0);

                if (parsedLines.length === 0) {
                    alert("연습할 텍스트를 입력해주세요.");
                    return;
                }

                setLines(parsedLines);
                setCurrentLineIndex(0);
                setUserInput('');
                setStartTime(Date.now());
                setElapsedSeconds(0);
                setTotalStrokes(0);
                setCorrectStrokes(0);
                setCurrentSpeed(0);
                setMaxSpeed(0);
                setAccuracy(100);
                setMode('practice');
            };

            useEffect(() => {
                if (mode === 'practice' && inputRef.current) {
                    inputRef.current.focus();
                }
            }, [mode, currentLineIndex]);

            useEffect(() => {
                let interval = null;
                if (mode === 'practice' && startTime) {
                    interval = setInterval(() => {
                        const now = Date.now();
                        const seconds = Math.floor((now - startTime) / 1000);
                        setElapsedSeconds(seconds);

                        if (seconds > 0 && correctStrokes > 0) {
                            const speed = Math.floor((correctStrokes * 2.5) / (seconds / 60));
                            setCurrentSpeed(speed);
                            setMaxSpeed(prev => Math.max(prev, speed));
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [mode, startTime, correctStrokes]);

            const handleInputChange = (e) => {
                const val = e.target.value;
                const targetLine = lines[currentLineIndex];
                
                if (val.length > targetLine.length + 5) return;

                setUserInput(val);

                let correctCount = 0;
                for (let i = 0; i < val.length; i++) {
                    if (val[i] === targetLine[i]) {
                        correctCount++;
                    }
                }

                const tempTotal = totalStrokes + val.length;
                const tempCorrect = correctStrokes + correctCount;
                
                if (tempTotal > 0) {
                    setAccuracy(Math.floor((tempCorrect / tempTotal) * 100));
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    const targetLine = lines[currentLineIndex];
                    
                    if (userInput.length === 0) return;

                    let correctCount = 0;
                    for (let i = 0; i < targetLine.length; i++) {
                        if (i < userInput.length && userInput[i] === targetLine[i]) {
                            correctCount++;
                        }
                    }

                    const lineTotalStrokes = Math.max(targetLine.length, userInput.length);
                    
                    setTotalStrokes(prev => prev + lineTotalStrokes);
                    setCorrectStrokes(prev => prev + correctCount);

                    if (currentLineIndex === lines.length - 1) {
                        setCompletionTime(new Date());
                        setMode('result');
                    } else {
                        setCurrentLineIndex(prev => prev + 1);
                        setUserInput('');
                    }
                }
            };

            const resetApp = () => {
                setMode('setup');
            };

            const formatDate = (date) => {
                if (!date) return '';
                const yyyy = date.getFullYear();
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const dd = String(date.getDate()).padStart(2, '0');
                const hh = String(date.getHours()).padStart(2, '0');
                const min = String(date.getMinutes()).padStart(2, '0');
                return `${yyyy}년 ${mm}월 ${dd}일 ${hh}:${min}`;
            };

            const handleDownload = () => {
                if (window.html2canvas) {
                    const resultCard = document.getElementById('result-card');
                    window.html2canvas(resultCard, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = `문학_타자연습_${new Date().getTime()}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    });
                } else {
                    alert('이미지 저장 기능을 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
                }
            };

            const renderSetupScreen = () => (
                <div className="flex flex-col items-center justify-center w-full max-w-4xl mx-auto p-6 space-y-8 animate-fade-in pt-10">
                    <div className="text-center space-y-4">
                        <div className="flex items-center justify-center space-x-3 text-blue-600">
                            <Keyboard size={40} />
                            <h1 className="text-4xl font-extrabold tracking-tight">문학 타자 연습</h1>
                        </div>
                        <p className="text-gray-600 text-lg">
                            수업 시간에 다루는 문학 작품을 직접 타이핑하며 텍스트와 깊이 교감해보세요.
                        </p>
                    </div>

                    <div className="w-full bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
                        <label className="block text-sm font-semibold text-gray-700 mb-2">
                            연습할 작품 텍스트 입력
                        </label>
                        <textarea
                            className="w-full h-64 p-4 text-gray-800 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none text-lg leading-relaxed font-serif"
                            value={customText}
                            onChange={(e) => setCustomText(e.target.value)}
                            placeholder="여기에 시나 소설의 발췌문을 붙여넣으세요..."
                        />
                        <div className="mt-6 flex justify-end">
                            <button
                                onClick={startPractice}
                                className="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold text-lg transition-all shadow-md hover:shadow-lg active:scale-95"
                            >
                                <Play size={20} />
                                <span>연습 시작하기</span>
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderPracticeScreen = () => {
                const targetLine = lines[currentLineIndex];
                const progress = Math.floor((currentLineIndex / lines.length) * 100);

                return (
                    <div className="flex flex-col w-full max-w-5xl mx-auto p-4 md:p-8 space-y-6 pt-10">
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 md:p-6 flex flex-wrap justify-between items-center gap-4">
                            <div className="flex items-center space-x-6 w-full md:w-auto">
                                <div className="flex flex-col">
                                    <span className="text-xs text-gray-500 font-bold uppercase tracking-wider">진행도</span>
                                    <div className="flex items-center space-x-2">
                                        <div className="w-24 md:w-32 h-2 bg-gray-200 rounded-full overflow-hidden">
                                            <div className="h-full bg-blue-500 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                                        </div>
                                        <span className="text-lg font-bold text-blue-700">{progress}%</span>
                                    </div>
                                </div>
                                <div className="h-8 w-px bg-gray-200 hidden md:block"></div>
                                <div className="flex flex-col">
                                    <span className="text-xs text-gray-500 font-bold uppercase tracking-wider">정확도</span>
                                    <span className="text-2xl font-black text-green-600">{accuracy}%</span>
                                </div>
                            </div>

                            <div className="flex items-center space-x-6 w-full md:w-auto justify-end">
                                <div className="flex flex-col items-end">
                                    <span className="text-xs text-gray-500 font-bold uppercase tracking-wider">현재 타수</span>
                                    <span className="text-3xl font-black text-blue-600">{currentSpeed} <span className="text-sm text-gray-500 font-normal">타/분</span></span>
                                </div>
                                <div className="h-8 w-px bg-gray-200 hidden md:block"></div>
                                <div className="flex flex-col items-end">
                                    <span className="text-xs text-gray-500 font-bold uppercase tracking-wider">최고 타수</span>
                                    <span className="text-xl font-bold text-gray-800">{maxSpeed}</span>
                                </div>
                                <button onClick={resetApp} className="ml-4 p-2 text-gray-400 hover:text-red-500 transition-colors bg-gray-50 rounded-full hover:bg-red-50" title="그만두기">
                                    <RotateCcw size={20} />
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
                            <div className="px-8 py-4 bg-gray-50 border-b border-gray-100 min-h-[4rem] flex items-center">
                                {currentLineIndex > 0 ? (
                                    <p className="text-gray-400 text-xl font-serif">{lines[currentLineIndex - 1]}</p>
                                ) : (
                                    <p className="text-gray-300 text-sm italic">시작 위치입니다.</p>
                                )}
                            </div>

                            <div className="p-8 space-y-6 bg-blue-50/30">
                                <div className="text-2xl md:text-3xl font-serif font-medium tracking-wide flex flex-wrap leading-relaxed">
                                    {targetLine.split('').map((char, idx) => {
                                        let colorClass = "text-gray-700";
                                        let bgClass = "bg-transparent";

                                        if (idx < userInput.length) {
                                            if (userInput[idx] === char) {
                                                colorClass = "text-blue-600 font-bold";
                                            } else {
                                                colorClass = "text-red-600 font-bold";
                                                bgClass = "bg-red-100 rounded-sm";
                                            }
                                        } else if (idx === userInput.length) {
                                            bgClass = "border-b-4 border-blue-400 pb-1 -mb-1 animate-pulse";
                                        }

                                        return (
                                            <span key={idx} className={`${colorClass} ${bgClass} transition-colors duration-150`}>
                                                {char === ' ' ? '\u00A0' : char}
                                            </span>
                                        );
                                    })}
                                    {userInput.length > targetLine.length && (
                                        <span className="text-red-600 font-bold bg-red-100 rounded-sm">
                                            {userInput.slice(targetLine.length).split('').map(c => c === ' ' ? '\u00A0' : c)}
                                        </span>
                                    )}
                                </div>

                                <div className="relative">
                                    <input
                                        ref={inputRef}
                                        type="text"
                                        value={userInput}
                                        onChange={handleInputChange}
                                        onKeyDown={handleKeyDown}
                                        className="w-full text-2xl md:text-3xl font-serif text-gray-800 bg-white border-2 border-blue-200 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all shadow-inner pr-16"
                                        placeholder="위 문장을 따라 치고 엔터(Enter)를 누르세요."
                                        autoComplete="off"
                                        spellCheck="false"
                                    />
                                    <div className={`absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 items-center space-x-1 pointer-events-none transition-opacity duration-300 ${userInput.length > 0 ? 'opacity-0 md:opacity-100 hidden md:flex' : 'flex opacity-100'}`}>
                                        <span className="text-sm font-bold bg-gray-100 px-2 py-1 rounded">Enter ↵</span>
                                    </div>
                                </div>
                            </div>

                            <div className="px-8 py-4 bg-gray-50 border-t border-gray-100 min-h-[4rem] flex items-center">
                                {currentLineIndex < lines.length - 1 ? (
                                    <p className="text-gray-500 text-xl font-serif">{lines[currentLineIndex + 1]}</p>
                                ) : (
                                    <p className="text-gray-300 text-sm italic">마지막 문장입니다.</p>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderResultScreen = () => {
                const finalSpeed = elapsedSeconds > 0 
                    ? Math.floor((correctStrokes * 2.5) / (elapsedSeconds / 60)) 
                    : 0;

                return (
                    <div className="flex flex-col items-center justify-center w-full max-w-3xl mx-auto p-6 animate-fade-in-up space-y-6 pt-10">
                        <div id="result-card" className="bg-white w-full rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
                            <div className="bg-blue-600 p-8 text-center text-white">
                                <CheckCircle size={64} className="mx-auto mb-4 text-blue-200" />
                                <h2 className="text-4xl font-black mb-2">학습 완료!</h2>
                                <p className="text-blue-100 text-lg">작품의 텍스트를 끝까지 읽고 타이핑하느라 고생했습니다.</p>
                                {completionTime && (
                                    <div className="mt-4 flex items-center justify-center space-x-2 text-blue-200 bg-blue-700/50 py-2 px-4 rounded-full inline-flex">
                                        <Calendar size={18} />
                                        <span className="font-medium">{formatDate(completionTime)} 완료</span>
                                    </div>
                                )}
                            </div>
                            
                            <div className="p-10 grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                                <div className="bg-gray-50 p-6 rounded-2xl flex flex-col items-center justify-center border border-gray-100 shadow-sm">
                                    <Trophy size={32} className="text-yellow-500 mb-3" />
                                    <span className="text-sm text-gray-500 font-bold mb-1">평균 타수</span>
                                    <span className="text-4xl font-black text-gray-800">{finalSpeed}<span className="text-lg font-medium text-gray-500 ml-1">타/분</span></span>
                                </div>
                                <div className="bg-gray-50 p-6 rounded-2xl flex flex-col items-center justify-center border border-gray-100 shadow-sm">
                                    <Target size={32} className="text-green-500 mb-3" />
                                    <span className="text-sm text-gray-500 font-bold mb-1">정확도</span>
                                    <span className="text-4xl font-black text-gray-800">{accuracy}<span className="text-lg font-medium text-gray-500 ml-1">%</span></span>
                                </div>
                                <div className="bg-gray-50 p-6 rounded-2xl flex flex-col items-center justify-center border border-gray-100 shadow-sm">
                                    <Clock size={32} className="text-blue-500 mb-3" />
                                    <span className="text-sm text-gray-500 font-bold mb-1">소요 시간</span>
                                    <span className="text-4xl font-black text-gray-800">
                                        {Math.floor(elapsedSeconds / 60)}<span className="text-lg font-medium text-gray-500 ml-1 mr-2">분</span>
                                        {elapsedSeconds % 60}<span className="text-lg font-medium text-gray-500 ml-1">초</span>
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col md:flex-row justify-center w-full space-y-4 md:space-y-0 md:space-x-4">
                            <button
                                onClick={handleDownload}
                                className="flex items-center justify-center space-x-2 bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-xl font-bold text-lg transition-all shadow-md active:scale-95 w-full md:w-auto"
                            >
                                <Download size={24} />
                                <span>결과 이미지로 저장</span>
                            </button>
                            <button
                                onClick={resetApp}
                                className="flex items-center justify-center space-x-2 bg-gray-800 hover:bg-gray-900 text-white px-8 py-4 rounded-xl font-bold text-lg transition-all shadow-md active:scale-95 w-full md:w-auto"
                            >
                                <RotateCcw size={24} />
                                <span>다른 작품으로 다시 하기</span>
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <React.Fragment>
                    {mode === 'setup' && renderSetupScreen()}
                    {mode === 'practice' && renderPracticeScreen()}
                    {mode === 'result' && renderResultScreen()}
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TypingPractice />);
    </script>
</body>
</html>
